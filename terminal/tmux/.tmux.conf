# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix: Ctrl + V
unbind C-b
set-option -g prefix C-v
bind-key C-v send-prefix

# Prefix Bindings
bind-key d kill-pane
bind-key f kill-window

# Direct Bindings (NO Prefix Needed)
bind-key -n C-d split-window -v -c '#{pane_current_path}'
bind-key -n C-f new-window -c '#{pane_current_path}'
bind-key -n C-w kill-pane
bind-key -n C-g previous-window
bind-key -n C-q select-pane -t :.+

# Bar configuration
set-option -g status-position top
set-option -g status-left " #[bold]#S#[nobold]  "
set-option -g status-right " Gurbax's Macbook  %y-%m-%d %I:%M %p "
set-option -g status-left-length 30
set-option -g status-right-length 60
set-option -g window-status-format " #I:#W "
set-option -g window-status-current-format " #[bold]#I:#W#[nobold] "

# Enable more scrollback
set-option -g history-limit 10000

# Enable mouse
set-option -g mouse on

# Speed up repeat
set-option -g repeat-time 200

# Colors
set -g mode-style "bg=#b4d5ff,fg=#000000"
set -g status-style "bg=#1f2428,fg=#9afba1"
set -g window-status-current-style "bg=#1f2428,fg=#9afba1,bold"
set -g window-status-style "bg=#1f2428,fg=#9afba1"
set -g status-left-style "bg=#1f2428,fg=#9afba1"
set -g status-right-style "bg=#1f2428,fg=#9afba1"
bind-key -n C-e split-window -h -c '#{pane_current_path}'
bind-key -n C-e split-window -h -c '#{pane_current_path}'
